name: E2E Integration Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    # ── 设置 Python ────────────────────────────────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    # ── 安装后端依赖 ───────────────────────────────────────────────────────
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psutil

    # ── 设置 Node.js ──────────────────────────────────────────────────────
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # ── 安装前端依赖 ──────────────────────────────────────────────────────
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: |
        npm ci
        npx playwright install --with-deps chromium

    # ── 启动后端服务 ───────────────────────────────────────────────────────
    - name: Start backend server
      working-directory: ./backend
      run: |
        nohup python start_backend.py > /tmp/backend.log 2>&1 &
        echo "Backend PID: $!"
        # 等待后端启动
        for i in {1..30}; do
          if curl -s http://localhost:8002/health > /dev/null; then
            echo "✅ Backend is ready"
            break
          fi
          sleep 1
        done
        # 检查后端是否启动成功
        curl -s http://localhost:8002/health || (cat /tmp/backend.log && exit 1)

    # ── 启动前端服务 ──────────────────────────────────────────────────────
    - name: Start frontend server
      working-directory: ./frontend
      run: |
        nohup npm run dev -- --host 0.0.0.0 --port 60100 > /tmp/frontend.log 2>&1 &
        echo "Frontend PID: $!"
        # 等待前端启动
        for i in {1..30}; do
          if curl -s http://localhost:60100 > /dev/null; then
            echo "✅ Frontend is ready"
            break
          fi
          sleep 1
        done
        # 检查前端是否启动成功
        curl -s http://localhost:60100 > /dev/null || (cat /tmp/frontend.log && exit 1)

    # ── 运行 E2E 测试 ─────────────────────────────────────────────────────
    - name: Run Playwright E2E tests
      working-directory: ./frontend
      run: |
        npx playwright test --project=chromium
      env:
        CI: true
        PLAYWRIGHT_BASE_URL: http://localhost:60100
        API_BASE_URL: http://localhost:8002

    # ── 上传测试报告 ──────────────────────────────────────────────────────
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-e2e
        path: frontend/playwright-report/
        retention-days: 30

    # ── 上传日志 ──────────────────────────────────────────────────────────
    - name: Upload server logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: server-logs
        path: |
          /tmp/backend.log
          /tmp/frontend.log
        retention-days: 7

    # ── 停止服务 ──────────────────────────────────────────────────────────
    - name: Stop servers
      if: always()
      run: |
        pkill -f "uvicorn" || true
        pkill -f "vite" || true

  # ── 快速冒烟测试（不需要完整 E2E）───────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psutil

    - name: Start and test backend
      working-directory: ./backend
      run: |
        nohup python start_backend.py > /tmp/backend.log 2>&1 &
        BACKEND_PID=$!
        
        # 等待启动
        for i in {1..30}; do
          if curl -s http://localhost:8002/health > /dev/null; then
            echo "✅ Backend started successfully"
            break
          fi
          sleep 1
        done
        
        # 运行基本 API 测试
        curl -s http://localhost:8002/health | grep -q "ok" || (echo "Health check failed"; cat /tmp/backend.log; exit 1)
        curl -s http://localhost:8002/api/v1/market/overview > /dev/null || echo "Market API check failed"
        
        # 停止服务
        kill $BACKEND_PID || true
        echo "✅ Smoke test passed"