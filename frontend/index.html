<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaTerminal - 金融投研平台</title>
    <!-- Gridstack.js CDN (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css" />
    <!-- ECharts removed from CDN - now lazy loaded via dynamic imports -->

    <!-- FOUC 防护：在 Vue 渲染前同步应用 data-theme 属性 -->
    <script>
    (function() {
      var saved = localStorage.getItem('alphaterminal-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      var validThemes = ['dark', 'black', 'wind', 'light'];
      if (validThemes.indexOf(theme) === -1) theme = 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
